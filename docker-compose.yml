services:
  db:
    image: postgres:16
    container_name: worldcupagents-db
    environment:
      POSTGRES_DB: worldcupagents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d worldcupagents"]
      interval: 2s
      timeout: 2s
      retries: 10

volumes:
  pgdata:
